<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STARZ Pasienky 25 m — voľné dráhy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Mestská plaváreň Pasienky <span class="muted">25 m</span></h1>
    <div class="meta">
      <span id="now"></span>
      <span id="status-pill" class="pill"></span>
      <a href="https://bratislava.sk/vzdelavanie-a-volny-cas/starz/prevadzky-sportoviska/mestska-plavaren-pasienky-25m" target="_blank" rel="noopener">Zdroj: STARZ</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="card">
        <h3>Práve teraz</h3>
        <div class="big" id="now-big">—</div>
        <div class="sub" id="now-sub"></div>
        <div class="next muted" id="now-next"></div>
      </div>
      <div class="card" id="today-blocks"></div>
    </section>

    <h2 class="section-title">Dostupnosť po 15 minútach (14 dní)</h2>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>

    <div class="legend">
      <span>voľných dráh:</span>
      <span><i class="sw lane-0"></i> 0 (mimo verejnosti)</span>
      <span><i class="sw lane-1"></i> 1</span>
      <span><i class="sw lane-2"></i> 2</span>
      <span><i class="sw lane-3"></i> 3</span>
      <span><i class="sw lane-4"></i> 4</span>
      <span><i class="sw now"></i> práve teraz</span>
    </div>
  </main>

  <footer>
    Rozvrh z tabuľky STARZ (aktualizuje sa denne). Uložené lokálne v <code>schedule.json</code>.
    <span id="updated"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
